<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1e1e"/>
      <stop offset="100%" stop-color="#252526"/>
    </linearGradient>
    <linearGradient id="lens" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4FC3F7" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#007ACC" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- Background rounded rect (explorer panel) -->
  <rect x="4" y="8" width="84" height="112" rx="8" fill="url(#bg)" stroke="#3C3C3C" stroke-width="2"/>

  <!-- Title bar -->
  <rect x="4" y="8" width="84" height="20" rx="8" fill="#2D2D2D"/>
  <rect x="4" y="20" width="84" height="8" fill="#2D2D2D"/>
  <!-- Title bar dots -->
  <circle cx="16" cy="18" r="3" fill="#FF5F56"/>
  <circle cx="28" cy="18" r="3" fill="#FFBD2E"/>
  <circle cx="40" cy="18" r="3" fill="#27C93F"/>

  <!-- Tab label -->
  <rect x="12" y="34" width="48" height="6" rx="2" fill="#007ACC" opacity="0.8"/>
  <rect x="66" y="34" width="16" height="6" rx="2" fill="#555"/>

  <!-- File list items -->
  <!-- Folder 1 -->
  <rect x="14" y="48" width="8" height="8" rx="1" fill="#C586C0" opacity="0.7"/>
  <rect x="26" y="50" width="36" height="4" rx="1.5" fill="#CCCCCC" opacity="0.6"/>

  <!-- File 1 -->
  <rect x="18" y="62" width="6" height="7" rx="1" fill="#519ABA" opacity="0.7"/>
  <rect x="28" y="64" width="44" height="4" rx="1.5" fill="#CCCCCC" opacity="0.5"/>

  <!-- File 2 (modified - yellow indicator) -->
  <rect x="18" y="76" width="6" height="7" rx="1" fill="#519ABA" opacity="0.7"/>
  <rect x="28" y="78" width="32" height="4" rx="1.5" fill="#CCCCCC" opacity="0.5"/>
  <rect x="66" y="77" width="8" height="5" rx="2" fill="#E8C73A" opacity="0.8"/>

  <!-- Folder 2 -->
  <rect x="14" y="90" width="8" height="8" rx="1" fill="#C586C0" opacity="0.7"/>
  <rect x="26" y="92" width="28" height="4" rx="1.5" fill="#CCCCCC" opacity="0.6"/>

  <!-- File 3 (added - green indicator) -->
  <rect x="18" y="104" width="6" height="7" rx="1" fill="#519ABA" opacity="0.7"/>
  <rect x="28" y="106" width="38" height="4" rx="1.5" fill="#CCCCCC" opacity="0.5"/>
  <rect x="72" y="105" width="8" height="5" rx="2" fill="#4EC9B0" opacity="0.8"/>

  <!-- Telescope body (angled) -->
  <g transform="translate(72, 32) rotate(-35)">
    <!-- Main tube -->
    <rect x="0" y="-5" width="44" height="10" rx="5" fill="#007ACC"/>
    <rect x="0" y="-5" width="44" height="10" rx="5" fill="url(#lens)"/>
    <!-- Tube highlight -->
    <rect x="4" y="-3" width="36" height="3" rx="1.5" fill="#fff" opacity="0.15"/>
    <!-- Lens ring -->
    <circle cx="44" cy="0" r="9" fill="none" stroke="#4FC3F7" stroke-width="2.5"/>
    <circle cx="44" cy="0" r="6" fill="#4FC3F7" opacity="0.25"/>
    <!-- Lens glare -->
    <ellipse cx="46" cy="-3" rx="3" ry="2" fill="#fff" opacity="0.4"/>
    <!-- Eyepiece -->
    <rect x="-8" y="-4" width="10" height="8" rx="3" fill="#005A9E"/>
    <!-- Focus ring -->
    <rect x="14" y="-6" width="5" height="12" rx="2" fill="#005A9E" opacity="0.6"/>
  </g>

  <!-- Small sparkle near lens -->
  <g transform="translate(108, 20)" opacity="0.6">
    <line x1="0" y1="-4" x2="0" y2="4" stroke="#4FC3F7" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-4" y1="0" x2="4" y2="0" stroke="#4FC3F7" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-2.5" y1="-2.5" x2="2.5" y2="2.5" stroke="#4FC3F7" stroke-width="1" stroke-linecap="round"/>
    <line x1="2.5" y1="-2.5" x2="-2.5" y2="2.5" stroke="#4FC3F7" stroke-width="1" stroke-linecap="round"/>
  </g>
</svg>
